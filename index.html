<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zéro Gâchis</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root { --ink: #0F1A15; --surface: #17251E; --surface-raised: #1E2E25; --leaf: #6FCF63; --paper: #EDF5EE; --mist: #8FA79A; --tomato: #FF6B4A; --ember: #3A0F0B; --hairline: #2B3D31; }
* { box-sizing: border-box; } body { font-family: 'Inter', sans-serif; background: var(--ink); margin: 0; color: var(--paper); height: 100vh; overflow: hidden; }
.container { display: flex; flex-direction: column; height: 100vh; max-width: 520px; margin: 0 auto; padding: 18px 16px 0; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.btn { border: none; cursor: pointer; font-weight: 600; border-radius: 11px; padding: 12px; }
.btn-add { background: var(--leaf); color: #0B1A0E; }
.search-input { width: 100%; padding: 12px; border: 1px solid var(--hairline); background: var(--surface); color: var(--paper); margin-bottom: 12px; }
#productList { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; overflow-y: auto; flex: 1; }
.item-card { background: var(--surface); padding: 10px; border-radius: 16px; text-align: center; cursor: pointer; }
</style></head><body><div class="container">
<header><div class="brand">🌿 Zéro Gâchis</div><div id="itemCount">0 aliment</div></header>
<div class="button-group"><button class="btn btn-add" onclick="openAddModal()">Ajouter</button></div>
<input type="text" id="searchInput" class="search-input" placeholder="Rechercher..." oninput="render()">
<div id="productList"></div>


  <div id="itemModal" class="modal-overlay">
  <div class="modal-box">
    <h3>Ajouter un aliment</h3>
    <input type="text" id="foodName" class="modal-input" placeholder="Nom">
    <input type="date" id="expiryDate" class="modal-input">
    <select id="storageLocation" class="modal-input">
      <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
      <option value="🗄️ Placard">🗄️ Placard</option>
    </select>
    <button class="modal-btn" onclick="saveFood()">Enregistrer</button>
    <button class="modal-btn" onclick="closeModal('itemModal')">Annuler</button>
    <div id="reader"></div>
  </div>
</div>
<style>
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: flex-end; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--surface-raised); padding: 20px; width: 100%; max-width: 460px; border-radius: 20px 20px 0 0; }
.modal-input { width: 100%; padding: 10px; margin: 5px 0; background: var(--surface); border: 1px solid var(--hairline); color: white; }
</style>


  <script>
const $ = id => document.getElementById(id);
let inventory = JSON.parse(localStorage.getItem('inventory')||"[]");
function save() { localStorage.setItem('inventory', JSON.stringify(inventory)); }
function openAddModal() { $('itemModal').classList.add('show'); }
function closeModal(id) { $(id).classList.remove('show'); }
function saveFood() {
  const n = $('foodName').value, d = $('expiryDate').value, l = $('storageLocation').value;
  if(!n || !d) return alert("Remplissez tout");
  inventory.push({id:Date.now(), name:n, date:d, loc:l, selected:false});
  save(); closeModal('itemModal'); render();
}
function render() {
  const lst = $('productList'); lst.innerHTML = "";
  inventory.forEach(i => {
    const div = document.createElement('div');
    div.className = "item-card";
    div.innerHTML = `<div>${i.name}</div><div style="font-size:10px">${i.date}</div>`;
    lst.appendChild(div);
  });
}
render();
</script></div></body></html>
