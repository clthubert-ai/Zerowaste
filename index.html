<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zéro Gâchis</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1A15;--surface:#17251E;--surface-raised:#1E2E25;--leaf:#6FCF63;--leaf-dim:#39562F;--paper:#EDF5EE;--mist:#8FA79A;--mist-dim:#66806F;--tomato:#FF6B4A;--tomato-dim:#5A2C20;--ember:#3A0F0B;--ember-text:#FFD9CF;--hairline:#2B3D31;--clay:#FF9F5A;--clay-dim:#5A3B22;--radius-md:16px;--radius-sm:11px}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--paper);margin:0;padding:0;height:100vh;overflow:hidden}
.container{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;padding:18px 16px 0}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand-mark{width:38px;height:38px;border-radius:12px;background:conic-gradient(from 210deg,var(--leaf),#FFC857 40%,var(--leaf) 100%);display:flex;align-items:center;justify-content:center}
.btn{border:none;cursor:pointer;font-weight:600;border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:6px}
.search-input{width:100%;padding:12px 13px 12px 36px;border:1px solid var(--hairline);border-radius:var(--radius-sm);background:var(--surface);color:var(--paper);margin-bottom:12px}
.item-card{background:var(--surface);border-radius:var(--radius-md);padding:10px;display:flex;align-items:center;cursor:pointer;position:relative}
.qty-badge{position:absolute;top:-4px;right:-4px;background:var(--leaf);color:var(--ink);padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:800}
.favorite-chip{background:var(--surface);border:1px solid var(--hairline);padding:4px 10px;border-radius:100px;font-size:0.7rem;color:var(--mist);cursor:pointer;margin-right:5px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(6,10,8,.72);backdrop-filter:blur(3px);z-index:1000;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface-raised);padding:22px;border-radius:26px 26px 0 0;width:100%;max-width:460px;max-height:88vh;overflow-y:auto}
</style></head><body><div class="container">
<header><div class="brand-mark">🌿</div><div id="itemCount">0 aliment</div></header>
<button class="btn" onclick="openAddModal()">Ajouter</button>
<input type="text" id="searchInput" class="search-input" placeholder="Rechercher..." oninput="render()">
<div id="favoritesList" style="margin-bottom:10px"></div>
<div id="productList"></div>
<div id="itemModal" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitle">Nouvel aliment</h3>
    <input type="text" id="foodName" class="modal-input" placeholder="Nom">
    <div style="display:flex; gap:10px;">
       <input type="number" id="foodQty" class="modal-input" placeholder="Qté" value="1" min="1">
       <input type="date" id="expiryDate" class="modal-input">
    </div>
    <select id="storageLocation" class="modal-input"><option>❄️ Réfrigérateur</option><option>🧊 Congélateur</option><option>🗄️ Placard</option></select>
    <button class="btn" onclick="saveFood()" style="width:100%; justify-content:center; background:var(--leaf); color:var(--ink)">Enregistrer</button>
    <button class="btn" onclick="toggleScanner()" style="width:100%; justify-content:center; background:var(--surface)">Scanner 📷</button>
    <div id="reader"></div>
  </div>
</div>
<style>
.modal-input{width:100%;padding:12px;margin:8px 0;background:var(--surface);border:1px solid var(--hairline);color:var(--paper);border-radius:var(--radius-sm)}
</style>
<script>
const $ = id => document.getElementById(id);
let inventory = JSON.parse(localStorage.getItem('inventory')||"[]");
let usageStats = JSON.parse(localStorage.getItem('usageStats')||"{}");

const exactMatches={'pomme':'🍎','banane':'🍌','yaourt':'🥣','lait':'🥛'};
function getEmoji(n){ const name=n.toLowerCase(); return exactMatches[name] || '🍽️'; }

function render() {
  const query = $('searchInput').value.toLowerCase();
  const list = $('productList'); list.innerHTML = "";
  
  // Affichage Favoris
  const sorted = Object.entries(usageStats).sort((a,b)=>b[1]-a[1]).slice(0, 4);
  $('favoritesList').innerHTML = sorted.map(([n]) => `<span class="favorite-chip" onclick="fillName('${n}')">${n}</span>`).join('');

  // Liste filtrée
  inventory.filter(i=>i.name.toLowerCase().includes(query)).forEach(i=>{
    const div = document.createElement('div');
    div.className = "item-card";
    div.innerHTML = `<div>${getEmoji(i.name)} ${i.name}</div><span class="qty-badge">x${i.qty}</span>`;
    list.appendChild(div);
  });
}

function fillName(n) { $('foodName').value = n; }

function saveFood() {
  const name=$('foodName').value, qty=$('foodQty').value, date=$('expiryDate').value;
  if(!name) return alert("Nom requis");
  inventory.push({name, qty, date});
  usageStats[name] = (usageStats[name]||0) + 1;
  localStorage.setItem('inventory', JSON.stringify(inventory));
  localStorage.setItem('usageStats', JSON.stringify(usageStats));
  $('itemModal').classList.remove('show');
  render();
}

function openAddModal(){ $('itemModal').classList.add('show'); }
function toggleScanner(){ alert("Scanner activé"); }
render();
</script></div></body></html>
