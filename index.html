<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zéro Gâchis</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1A15;--surface:#17251E;--surface-raised:#1E2E25;--surface-hover:#243529;--hairline:#2B3D31;--paper:#EDF5EE;--mist:#8FA79A;--mist-dim:#66806F;--leaf:#6FCF63;--leaf-dim:#39562F;--amber:#FFC857;--amber-dim:#5A4A24;--clay:#FF9F5A;--clay-dim:#5A3B22;--tomato:#FF6B4A;--tomato-dim:#5A2C20;--ember:#3A0F0B;--ember-text:#FFD9CF;--ring-track:#2B3D31;--radius-lg:22px;--radius-md:16px;--radius-sm:11px}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 15% -10%,rgba(111,207,99,0.1),transparent 40%),var(--ink);margin:0;padding:0;color:var(--paper);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.container{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;padding:18px 16px 0}
header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:38px;height:38px;border-radius:12px;flex-shrink:0;background:conic-gradient(from 210deg,var(--leaf),var(--amber) 40%,var(--leaf) 100%);display:flex;align-items:center;justify-content:center;font-size:1.15rem}
.brand-text .l1{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:1.15rem}
.brand-text .l2{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:2.5px;color:var(--mist);text-transform:uppercase}
.today-pill{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--mist);border:1px solid var(--hairline);padding:5px 10px;border-radius:100px}
.button-group{display:flex;gap:8px;margin-bottom:8px}
.btn{border:none;cursor:pointer;font-weight:600;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add{flex:1.3;background:var(--leaf);color:#0B1A0E;padding:12px;font-size:.85rem}
.btn-del-selected{flex:1;background:var(--surface-raised);color:var(--tomato);padding:12px;font-size:.85rem;border:1px solid var(--hairline)}
.btn-search{background:var(--surface-raised);color:var(--paper);width:100%;padding:13px;border-radius:var(--radius-sm);font-weight:600;font-size:.87rem;margin-bottom:12px;border:1px solid var(--hairline)}
.search-input{width:100%;padding:12px 14px;border:1.5px solid var(--hairline);border-radius:var(--radius-sm);background:var(--surface);color:var(--paper);font-size:0.87rem;margin-bottom:14px}
.filter-group{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-btn{padding:7px 12px;border-radius:100px;border:1px solid var(--hairline);background:var(--surface);color:var(--mist);font-size:.68rem;font-weight:600;white-space:nowrap}
.filter-btn.active{background:var(--leaf-dim);border-color:var(--leaf);color:var(--leaf)}
#productList{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;overflow-y:auto;flex:1;padding-bottom:20px}
.item-card{background:var(--surface);border-radius:var(--radius-md);padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;border:1.5px solid transparent;cursor:pointer;text-align:center;position:relative}
.item-card.selected{border-color:var(--leaf);background:var(--surface-hover)}
.item-card[data-state="today"]{background:var(--clay-dim)}
.item-card[data-state="mild"]{background:var(--tomato-dim)}
.item-card[data-state="severe"]{background:var(--ember)}
.ring{width:44px;height:44px;border-radius:50%;margin-bottom:6px;display:flex;align-items:center;justify-content:center;position:relative;background:var(--ring-bg,conic-gradient(var(--mist-dim) 0 100%))}
.ring::before{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--surface)}
.item-card[data-state="today"] .ring::before{background:var(--clay-dim)}
.item-card[data-state="mild"] .ring::before{background:var(--tomato-dim)}
.item-card[data-state="severe"] .ring::before{background:var(--ember)}
.item-emoji{font-size:1.05rem;z-index:1}
.loc-badge{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--surface-raised);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;border:1.5px solid var(--surface);z-index:1}
.item-name{font-weight:700;font-size:.68rem;line-height:1.2;margin:0 0 2px}
.item-qty{font-size:0.6rem; color:var(--mist); font-weight:500; margin-bottom:2px;}
.item-status{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--mist);font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(6,10,8,.72);backdrop-filter:blur(3px);z-index:1000;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface-raised);padding:22px;border-radius:26px 26px 0 0;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--hairline)}
.field-label{font-size:.68rem;font-weight:600;color:var(--mist);margin:12px 0 5px;text-transform:uppercase}
.modal-input{width:100%;padding:12px 13px;border:1.5px solid var(--hairline);border-radius:var(--radius-sm);background:var(--surface);color:var(--paper);font-size:.9rem}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.modal-btn{padding:12px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:700}
.btn-confirm{background:var(--leaf);color:#0B1A0E}
.btn-scan{background:var(--surface);color:var(--paper);margin:14px 0 0;width:100%;padding:11px;border:1.5px solid var(--hairline)}
#reader{width:100%;display:none;margin:12px 0 0;border-radius:var(--radius-sm);overflow:hidden}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <div class="brand-mark">🌿</div>
      <div class="brand-text"><div class="l1">Zéro</div><div class="l2">Gâchis</div></div>
    </div>
    <div class="today-pill" id="itemCount">0 aliment</div>
  </header>
  <div class="button-group">
    <button class="btn btn-add" onclick="openAddModal()">Ajouter</button>
    <button class="btn btn-del-selected" onclick="handleBulkDelete()">Supprimer</button>
  </div>
  <button class="btn-search" onclick="openRecipeModal()">🍳 Trouver une recette</button>
  <input type="text" id="searchInput" class="search-input" placeholder="🔍 Rechercher..." oninput="filterList()">
  <div class="filter-group">
    <button class="filter-btn" id="toggleSelectBtn" onclick="toggleSelectAll()">Tout</button>
    <button class="filter-btn" id="filter-urgent" onclick="selectItems('urgent')">Bientôt</button>
    <button class="filter-btn" id="filter-today" onclick="selectItems('today')">Ce jour</button>
    <button class="filter-btn" id="filter-yesterday" onclick="selectItems('yesterday')">Périmé léger</button>
    <button class="filter-btn" id="filter-expired" onclick="selectItems('expired')">À jeter</button>
  </div>
  <div id="productList"></div>
</div>

  <div id="itemModal" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitle">Nouvel aliment</h3>
    <div class="field-label">Nom de l'aliment</div>
    <input type="text" id="foodName" class="modal-input" placeholder="Ex : Tomates">
    <div style="display:flex; gap:10px;">
      <div style="flex:1">
        <div class="field-label">Quantité</div>
        <input type="number" id="foodQty" class="modal-input" placeholder="0">
      </div>
      <div style="flex:1">
        <div class="field-label">Unité</div>
        <input type="text" id="foodUnit" class="modal-input" placeholder="g, ml, pcs...">
      </div>
    </div>
    <div class="field-label">Date limite</div>
    <input type="date" id="expiryDate" class="modal-input">
    <div class="field-label">Emplacement</div>
    <select id="storageLocation" class="modal-input">
      <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
      <option value="🧊 Congélateur">🧊 Congélateur</option>
      <option value="🗄️ Placard">🗄️ Placard</option>
    </select>
    <div class="field-label">Emoji personnalisé</div>
    <input type="text" id="foodEmoji" class="modal-input" placeholder="Laisser vide pour automatique">
    <button class="modal-btn btn-scan" id="scanBtn" onclick="toggleScanner()">Scanner un code-barres 📷</button>
    <div id="reader"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal('itemModal')" style="background:transparent;color:var(--mist)">Annuler</button>
      <button class="modal-btn btn-confirm" onclick="saveFood()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modales de suppression/alerte conservées ici -->
<div id="deleteModal" class="modal-overlay"><div class="modal-box"><h3>Supprimer ?</h3><div id="deleteList"></div><div class="modal-btns"><button class="modal-btn" onclick="closeModal('deleteModal')">Annuler</button><button class="modal-btn btn-confirm" style="background:var(--tomato)" onclick="confirmDelete()">Supprimer</button></div></div></div>
<div id="alertModal" class="modal-overlay"><div class="modal-box"><h3>Attention</h3><p id="alertText"></p><div class="modal-btns"><button class="modal-btn btn-confirm" onclick="closeModal('alertModal')">Compris</button></div></div></div>

<script>
const $ = id => document.getElementById(id);
const save = () => localStorage.setItem('inventory', JSON.stringify(inventory));
let inventory = JSON.parse(localStorage.getItem('inventory')||"[]"), editingId=null, html5QrCode=null, isScannerActive=false;

// [Utiliser ici le bloc const exactMatches et categories de votre code original]
const exactMatches={'banane':'🍌','pomme':'🍎','poire':'🍐','orange':'🍊','citron':'🍋','fraise':'🍓','framboise':'🍓','myrtille':'🫐','cerise':'🍒','peche':'🍑','mangue':'🥭','raisin':'🍇','ananas':'🍍','kiwi':'🥝','melon':'🍈','pasteque':'🍉','abricot':'🍑','prune':'🍑','concombre':'🥒','carotte':'🥕','brocoli':'🥦','oignon':'🧅','ail':'🧄','champignon':'🍄','poivron':'🫑','salade':'🥬','tomate':'🍅','patate':'🥔','pomme de terre':'🥔','haricot':'🫘','epinard':'🍃','courgette':'🥒','aubergine':'🍆','chou':'🥬','asperge':'🥬','poireau':'🥬','radis':'🥗','mais':'🌽','avocat':'🥑','steak':'🥩','gigot':'🥩','jambon':'🍖','chorizo':'🍖','poulet':'🍗','saumon':'🐟','thon':'🐟','crevette':'🍤','saucisse':'🌭','cote de porc':'🥩','cote de boeuf':'🥩','cote de mouton':'🥩','lard':'🥓','bacon':'🥓','oeuf':'🥚','pain':'🍞','baguette':'🥖','croissant':'🥐','brioche':'🍞','biscuit':'🍪','gateau':'🍰','riz':'🍚','pate':'🍝','nouille':'🍜','pizza':'🍕','taco':'🌮','burger':'🍔','sushi':'🍣','lait':'🥛','fromage':'🧀','beurre':'🧈','yaourt':'🥣','creme':'🥛','soupe':'🥣'};
const categories=[{emoji:'🥩',keys:['viande','boeuf','porc']},{emoji:'🐟',keys:['poisson','saumon']},{emoji:'🧀',keys:['fromage','lait']},{emoji:'🥦',keys:['legume','tomate']},{emoji:'🍎',keys:['fruit']},{emoji:'🌾',keys:['cereale','pain']},{emoji:'🥛',keys:['creme','beurre']},{emoji:'🍲',keys:['soupe']}];

function getEmoji(item) {
  if (item.customEmoji?.trim()) return item.customEmoji;

  // 1. Normalisation de base (ton code original)
  const n = item.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
  
  // 2. Création de la version singulière : on supprime les 's' en fin de mot
  const nSingular = n.replace(/s\b/g, "");

  // 3. Vérification dans exactMatches (on teste le mot brut ET le mot singulier)
  if (exactMatches[n]) return exactMatches[n];
  if (exactMatches[nSingular]) return exactMatches[nSingular];

  // 4. Vérification dans les catégories (structure initiale conservée)
  for (let c of categories) {
    // Si la clé est présente dans le nom original OU dans le nom simplifié, on renvoie l'emoji
    if (c.keys.some(k => n.includes(k) || nSingular.includes(k))) return c.emoji;
  }

  return '🍽️';
}
function getDiffDays(item){ const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(item.date)-t)/86400000); }
function getState(d){ return d<-2?'severe':d<0?'mild':d===0?'today':d<=5?'soon':'fresh'; }
function getStatusLabel(d){ return d<-2?`Périmé ${Math.abs(d)}j`:d===-2?'Avant-hier':d===-1?'Hier':d===0?"Aujourd'hui":d===1?'Demain':`Dans ${d} j`; }
function getRingBackground(s,d){ return s==='soon'?`conic-gradient(var(--amber) ${Math.max(10,Math.min(100,((6-d)/5)*100))}%, var(--ring-track) 0)`:s==='today'?`conic-gradient(var(--clay) 0 100%)`:s==='mild'?`conic-gradient(var(--tomato) 0 100%)`:s==='severe'?`conic-gradient(#FF6B4A 0 100%)`:`conic-gradient(var(--mist-dim) 0 100%)`; }

function openAddModal(){
  editingId=null; $('modalTitle').innerText="Nouvel aliment";
  $('foodName').value=''; $('expiryDate').value=new Date().toISOString().split('T')[0];
  $('foodQty').value=''; $('foodUnit').value=''; $('foodEmoji').value=''; $('storageLocation').value='❄️ Réfrigérateur';
  $('itemModal').classList.add('show');
}

function openEditModal(i){
  editingId=i.id; $('modalTitle').innerText="Modifier l'aliment";
  $('foodName').value=i.name; $('expiryDate').value=i.date;
  $('foodQty').value=i.qty||''; $('foodUnit').value=i.unit||''; $('foodEmoji').value=i.customEmoji||''; $('storageLocation').value=i.loc;
  $('itemModal').classList.add('show');
}

function saveFood(){
  const n=$('foodName').value, d=$('expiryDate').value, l=$('storageLocation').value, e=$('foodEmoji').value, q=$('foodQty').value, u=$('foodUnit').value;
  if(!n||!d) return alert("Nom et date requis");
  if(editingId){ const i=inventory.find(i=>i.id==editingId); if(i) Object.assign(i,{name:n,date:d,loc:l,customEmoji:e,qty:q,unit:u}); }
  else inventory.push({id:Date.now().toString(),name:n,date:d,loc:l,customEmoji:e,qty:q,unit:u,selected:false});
  save(); closeModal('itemModal'); render();
}

function render(){
  const lst=$('productList'); lst.innerHTML="";
  inventory.sort((a,b)=>new Date(a.date)-new Date(b.date));
  inventory.forEach((i,idx)=>{
    const d=getDiffDays(i), s=getState(d);
    const div=document.createElement('div');
    div.className=`item-card ${i.selected?'selected':''}`;
    div.dataset.state=s==='soon'?'':s;
    div.onclick=()=>{i.selected=!i.selected; save(); render();};
    div.oncontextmenu=e=>{e.preventDefault(); openEditModal(i);};
    
    // Affichage conditionnel de la quantité
    const qtyHtml = (i.qty && i.qty !== "") ? `<div class="item-qty">${i.qty}${i.unit||''}</div>` : '';
    
    div.innerHTML=`<div class="ring" style="--ring-bg:${getRingBackground(s,d)}"><span class="item-emoji">${getEmoji(i)}</span><span class="loc-badge">${i.loc.trim().split(' ')[0]}</span></div><div class="item-name">${i.name}</div>${qtyHtml}<div class="item-status">${getStatusLabel(d)}</div>`;
    lst.appendChild(div);
  });
  $('itemCount').innerText=`${inventory.length} aliments`;
}

const closeModal = id => $(id).classList.remove('show');
function handleBulkDelete(){ $('deleteModal').classList.add('show'); }
function confirmDelete(){ inventory=inventory.filter(i=>!i.selected); save(); closeModal('deleteModal'); render(); }
function toggleScanner(){ /* Logique scanner inchangée */ }
function filterList(){ /* Logique filtre inchangée */ }
function selectItems(t){ /* Logique sélection inchangée */ }
function toggleSelectAll(){ /* Logique tout sélectionner inchangée */ }
function updateFilterButtonsState(){ /* Logique boutons inchangée */ }
function openRecipeModal(){ /* Logique recette inchangée */ }

render();
</script>
</body>
</html>
