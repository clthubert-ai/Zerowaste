<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gachi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; color: #2c3e50; }
        header { background: #2d5a27; color: white; padding: 25px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        input[type="text"], input[type="date"], select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-add { background: #2d5a27; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-search { background: #7fb069; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .item { background: white; padding: 10px; margin-bottom: 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .item.urgent { border-color: #d9534f; }
        .item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
        .visual { font-size: 1.4rem; width: 30px; text-align: center; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; overflow: hidden; }
        .item-name { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 0.75rem; color: #666; }
        .alert-text { color: #d9534f; font-weight: bold; font-size: 0.7rem; display: block; }
        .del-btn { background: #fee2e2; color: #991b1b; border: none; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; flex-shrink: 0; width: 55px; }
    </style>
</head>
<body>
    <header><h1>Zero Gachi</h1></header>
    <div class="container">
        <input type="text" id="foodName" placeholder="Nom de l'aliment">
        <input type="date" id="expiryDate">
        <select id="storageLocation">
            <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
            <option value="🧊 Congélateur">🧊 Congélateur</option>
            <option value="📦 Placard">📦 Placard</option>
        </select>
        <button class="btn-add" onclick="addFood()">Ajouter à l'inventaire</button>
        <div id="productList" style="margin-top: 20px;"></div>
        <button class="btn-search" onclick="searchRecipes()">Rechercher des recettes anti-gaspi</button>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory') || "[]");

        function getEmoji(name) {
            // Normalisation : met en minuscule et retire les accents (Côte -> cote)
            const n = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            
            // 1. Détection prioritaire (si le nom contient le mot clé, on attribue l'emoji)
            if (n.includes('banane')) return '🍌';
            if (n.includes('pomme')) return '🍎';
            if (n.includes('raisin')) return '🍇';
            if (n.includes('fraise') || n.includes('framboise')) return '🍓';
            
            // Viandes
            if (n.includes('steak') || n.includes('rumsteck') || n.includes('gigot') || 
                n.includes('cote') || n.includes('porc') || n.includes('boeuf') || 
                n.includes('viande') || n.includes('agneau') || n.includes('jambon')) return '🥩';
            if (n.includes('poulet')) return '🍗';
            
            // Poissons
            if (n.includes('poisson') || n.includes('saumon') || n.includes('thon') || 
                n.includes('cabillaud') || n.includes('crevette')) return '🐟';
            
            // Légumes
            if (n.includes('poireau') || n.includes('tomate') || n.includes('carotte') || 
                n.includes('concombre') || n.includes('legume') || n.includes('salade') || 
                n.includes('courgette') || n.includes('brocoli') || n.includes('oignon')) return '🥦';
            
            // Autres
            if (n.includes('pain') || n.includes('semoule') || n.includes('farine') || 
                n.includes('pates') || n.includes('riz')) return '🍞';
            if (n.includes('yaourt') || n.includes('lait') || n.includes('fromage')) return '🥛';

            return '🍽️';
        }

        function render() {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            inventory.sort((a, b) => new Date(a.date) - new Date(b.date));
            const today = new Date(); today.setHours(0,0,0,0);

            inventory.forEach((item, index) => {
                const expiry = new Date(item.date);
                const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                const isUrgent = diffDays <= 2 && diffDays >= 0;
                
                const div = document.createElement('div');
                div.className = `item ${isUrgent ? 'urgent' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" onchange="inventory[${index}].selected = this.checked" ${item.selected ? 'checked' : ''}>
                    <div class="visual">${getEmoji(item.name)}</div>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-meta">${item.date} • ${item.loc}</span>
                        ${isUrgent ? `<span class="alert-text">⚠️ Urgent (J-${diffDays})</span>` : ''}
                    </div>
                    <button class="del-btn" onclick="deleteFood(${index})">Suppr</button>
                `;
                list.appendChild(div);
            });
        }

        function addFood() {
            const name = document.getElementById('foodName').value;
            const date = document.getElementById('expiryDate').value;
            const loc = document.getElementById('storageLocation').value;
            if(!name || !date) return alert("Remplissez le nom et la date !");
            inventory.push({ name, date, loc, selected: false });
            localStorage.setItem('inventory', JSON.stringify(inventory));
            document.getElementById('foodName').value = '';
            render();
        }

        function deleteFood(index) {
            inventory.splice(index, 1);
            localStorage.setItem('inventory', JSON.stringify(inventory));
            render();
        }

        function searchRecipes() {
            const selected = inventory.filter(i => i.selected).map(i => i.name).join(" ");
            if(!selected) return alert("Cochez au moins un ingrédient !");
            window.open(`https://www.google.com/search?q=recette+anti-gaspi+${encodeURIComponent(selected)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
