<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gachi</title>
    <!-- Bibliothèque pour le scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; color: #2c3e50; min-height: 100vh; position: relative; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        header { background: transparent; padding: 0; margin-bottom: 15px; border-radius: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; display: flex; justify-content: center; }
        .header-logo { width: 100%; height: auto; display: block; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .button-group button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: #3e7b37; color: white; } 
        .btn-del-selected { background: #d9534f; color: white; }
        .btn-search { background: #7fb069; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .item { 
            background: white; padding: 12px 15px; margin-bottom: 10px; border-radius: 14px; 
            display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            transition: all 0.2s ease; cursor: pointer;
        }
        .item.selected { border-left: 8px solid #3e7b37; border-right: 8px solid #3e7b37; background-color: #f0f7ef; }
        
        /* États */
        .item.urgent { background-color: #fff3cd; } 
        .item.expired-yesterday { background-color: #ffcc99; } 
        .item.expired-long { background-color: #c9302c; color: white; }
        
        .visual { font-size: 1.4rem; width: 30px; text-align: center; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; overflow: hidden; }
        .item-name { font-weight: bold; display: block; }
        .item-meta { font-size: 0.75rem; color: #666; }
        .item.expired-long .item-meta { color: #ffe5e5; }
        .item-alert { flex-shrink: 0; font-weight: bold; font-size: 0.75rem; margin-left: 10px; text-align: right; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #eee; }
        .btn-confirm { background: #3e7b37; color: white; }
        
        .footer-date { position: fixed; bottom: 5px; right: 8px; font-size: 0.65rem; color: #aaa; }
    </style>
</head>
<body>
    
    <div class="container">
        <header>
            <img src="logo.png" alt="Zero Gachi" class="header-logo">
        </header>

        <div class="button-group">
            <button class="btn-add" onclick="openAddModal()">Ajout d'un aliment</button>
            <button class="btn-del-selected" onclick="handleBulkDelete()">Suppression</button>
        </div>
        
        <button class="btn-search" onclick="searchRecipes()">Rechercher des recettes</button>
        <button class="btn-search" id="scanBtn" style="background:#555; margin-top:10px;" onclick="toggleScanner()">Scanner un code-barres 📷</button>
        
        <div id="reader" style="width: 100%; display:none; margin-top:10px;"></div>
        <div id="productList" style="margin-top: 20px;"></div>
    </div>

    <div id="genDate" class="footer-date"></div>

    <!-- Modales -->
    <div id="itemModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">Aliment</h3>
            <input type="text" id="foodName" class="modal-input" placeholder="Nom">
            <input type="date" id="expiryDate" class="modal-input">
            <input type="text" id="foodEmoji" class="modal-input" placeholder="Emoji (optionnel)">
            <select id="storageLocation" class="modal-input">
                <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
                <option value="🧊 Congélateur">🧊 Congélateur</option>
                <option value="🗄️ Placard">🗄️ Placard</option>
            </select>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="closeModal('itemModal')">Annuler</button>
                <button class="modal-btn btn-confirm" onclick="saveFood()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Date de génération
            const now = new Date();
            document.getElementById('genDate').innerText = "Généré le " + now.toLocaleDateString('fr-FR') + " à " + now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});

            // Variables globales
            let inventory = JSON.parse(localStorage.getItem('inventory') || "[]");
            let editingId = null;
            let html5QrCode = null; 
            let isScannerActive = false;

            // Fonctions globales accessibles depuis HTML
            window.closeModal = (id) => document.getElementById(id).style.display = 'none';
            window.toggleScanner = () => isScannerActive ? stopScanner() : startScanner();
            
            // --- API & Scanner ---
            async function fetchProductName(barcode) {
                const url = `https://world.openfoodfacts.org/api/v2/product/${barcode}.json`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    return data.status === 1 ? (data.product.product_name_fr || data.product.product_name || barcode) : barcode;
                } catch (e) { return barcode; }
            }

            function startScanner() {
                isScannerActive = true;
                document.getElementById('reader').style.display = 'block';
                document.getElementById('scanBtn').innerText = "Fermer le scanner ❌";
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
                    stopScanner();
                    openAddModal();
                    document.getElementById('foodName').value = "Recherche...";
                    document.getElementById('foodName').value = await fetchProductName(decodedText);
                });
            }

            function stopScanner() {
                if (html5QrCode) {
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        document.getElementById('scanBtn').innerText = "Scanner un code-barres 📷";
                        isScannerActive = false;
                        html5QrCode = null;
                    }).catch(console.error);
                }
            }
            
            // --- Logique inventaire ---
            window.openAddModal = () => {
                editingId = null;
                document.getElementById('modalTitle').innerText = "Nouvel aliment";
                document.getElementById('foodName').value = '';
                document.getElementById('expiryDate').value = '';
                document.getElementById('itemModal').style.display = 'flex';
            };

            window.saveFood = () => {
                const name = document.getElementById('foodName').value;
                const date = document.getElementById('expiryDate').value;
                if(!name || !date) return alert("Remplissez tout !");
                
                if (editingId) {
                    const item = inventory.find(i => i.id === editingId);
                    Object.assign(item, { name, date, loc: document.getElementById('storageLocation').value });
                } else {
                    inventory.push({ id: Date.now().toString(), name, date, loc: document.getElementById('storageLocation').value, selected: false });
                }
                localStorage.setItem('inventory', JSON.stringify(inventory));
                closeModal('itemModal');
                render();
            };

            window.render = () => {
                const list = document.getElementById('productList');
                list.innerHTML = "";
                inventory.sort((a,b) => new Date(a.date) - new Date(b.date));
                inventory.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `item ${item.selected ? 'selected' : ''}`;
                    div.innerHTML = `<div class="visual">🍽️</div><div class="item-info"><span class="item-name">${item.name}</span><span class="item-meta">${item.date}</span></div>`;
                    div.onclick = () => { item.selected = !item.selected; localStorage.setItem('inventory', JSON.stringify(inventory)); render(); };
                    list.appendChild(div);
                });
            };

            window.handleBulkDelete = () => {
                inventory = inventory.filter(i => !i.selected);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                render();
            };

            window.searchRecipes = () => {
                const query = inventory.filter(i => i.selected).map(i => i.name).join(" ");
                if(query) window.open(`https://www.google.com/search?q=recette+anti-gaspi+${encodeURIComponent(query)}`, '_blank');
            };

            render();
        });
    </script>
</body>
</html>
