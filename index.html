<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gachi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; color: #2c3e50; }
        
        header { background: #2d5a27; color: white; padding: 18px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header-logo { height: 40px; width: auto; display: block; margin: 0 auto; }
        
        .container { max-width: 500px; margin: 10px auto; padding: 15px; }
        input[type="text"], input[type="date"], select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 10px; }
        .button-group button { margin: 8px 0; flex: 1; }

        .btn-add { background: #2d5a27; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-del-selected { background: #d9534f; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-search { background: #7fb069; color: white; border: none; font-weight: bold; cursor: pointer; }

        .item { background: white; padding: 10px; margin-bottom: 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .item.urgent { border-color: #d9534f; }
        
        .item.expired-one { background-color: #ffcccc; border-color: #ff4d4d; }
        .item.expired-long { background-color: black; border-color: #990000; }
        .item.expired-long .item-name, .item.expired-long .item-meta, .item.expired-long .alert-text { color: #ff0000; }

        .item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
        .visual { font-size: 1.4rem; width: 30px; text-align: center; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; overflow: hidden; }
        .item-name { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 0.75rem; color: #666; }
        .alert-text { color: #d9534f; font-weight: bold; font-size: 0.7rem; display: block; }
        .del-btn { background: #fee2e2; color: #991b1b; border: none; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; flex-shrink: 0; width: 55px; }

        /* Style du Modal */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal-text { margin-bottom: 20px; font-weight: 500; text-align: left; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-no { background: #eee; }
        .btn-yes { background: #d9534f; color: white; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Zero Gachi" class="header-logo">
    </header>
    <div class="container">
        <input type="text" id="foodName" placeholder="Nom de l'aliment">
        <input type="date" id="expiryDate">
        <select id="storageLocation">
            <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
            <option value="🧊 Congélateur">🧊 Congélateur</option>
            <option value="📦 Placard">📦 Placard</option>
        </select>
        
        <div class="button-group">
            <button class="btn-add" onclick="addFood()">Ajouter</button>
            <button class="btn-del-selected" onclick="handleBulkDelete()">Supprimer</button>
        </div>
        
        <button class="btn-search" onclick="searchRecipes()">Rechercher des recettes anti-gaspi</button>
        <div id="productList" style="margin-top: 20px;"></div>
    </div>

    <div id="customModal">
        <div class="modal-box">
            <div id="modalText" class="modal-text"></div>
            <div class="modal-btns">
                <button class="modal-btn btn-no" id="btnCancel" onclick="closeModal()">Annuler</button>
                <button class="modal-btn btn-yes" id="btnOk">OK</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory') || "[]");

        function showAlert(message) {
            document.getElementById('modalText').innerText = message;
            document.getElementById('btnCancel').style.display = 'none';
            document.getElementById('btnOk').onclick = closeModal;
            document.getElementById('customModal').style.display = 'flex';
        }

        function showConfirm(message, callback) {
            document.getElementById('modalText').innerHTML = message;
            document.getElementById('btnCancel').style.display = 'block';
            document.getElementById('btnOk').onclick = () => { callback(); closeModal(); };
            document.getElementById('customModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('customModal').style.display = 'none'; }

        function getEmoji(name) {
            const n = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            const exactMatches = { 'banane': '🍌', 'pomme': '🍎', 'poire': '🍐', 'orange': '🍊', 'citron': '🍋', 'fraise': '🍓', 'framboise': '🍓', 'myrtille': '🫐', 'cerise': '🍒', 'peche': '🍑', 'mangue': '🥭', 'raisin': '🍇', 'ananas': '🍍', 'kiwi': '🥝', 'melon': '🍈', 'pasteque': '🍉', 'abricot': '🍑', 'prune': '🍑', 'concombre': '🥒', 'carotte': '🥕', 'brocoli': '🥦', 'oignon': '🧅', 'ail': '🧄', 'champignon': '🍄', 'poivron': '🫑', 'salade': '🥬', 'tomate': '🍅', 'patate': '🥔', 'haricot': '🫘', 'epinard': '🍃', 'courgette': '🥒', 'aubergine': '🍆', 'chou': '🥬', 'asperge': '🥬', 'poireau': '🥬', 'radis': '🥗', 'mais': '🌽', 'avocat': '🥑', 'steak': '🥩', 'jambon': '🍖', 'poulet': '🍗', 'saumon': '🐟', 'thon': '🐟', 'crevette': '🍤', 'saucisse': '🌭', 'oeuf': '🥚', 'pain': '🍞', 'baguette': '🥖', 'croissant': '🥐', 'brioche': '🍞', 'biscuit': '🍪', 'gateau': '🍰', 'riz': '🍚', 'pate': '🍝', 'nouille': '🍜', 'pizza': '🍕', 'taco': '🌮', 'burger': '🍔', 'sushi': '🍣', 'lait': '🥛', 'fromage': '🧀', 'beurre': '🧈', 'yaourt': '🍦', 'creme': '🥛', 'soupe': '🥣' };
            if (exactMatches[n]) return exactMatches[n];
            return '🍽️';
        }

        function render() {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            inventory.sort((a, b) => new Date(a.date) - new Date(b.date));
            const today = new Date(); today.setHours(0,0,0,0);
            inventory.forEach((item, index) => {
                const expiry = new Date(item.date);
                const diffDays = Math.round((expiry - today) / (1000 * 60 * 60 * 24));
                let cssClass = '', alertText = '';
                if (diffDays === -1) { cssClass = 'expired-one'; alertText = '⚠️ Dépassé (Hier)'; }
                else if (diffDays < -1) { cssClass = 'expired-long'; alertText = '❌ Périmé depuis ' + Math.abs(diffDays) + ' jours'; }
                else if (diffDays >= 0 && diffDays <= 2) { cssClass = 'urgent'; alertText = diffDays === 0 ? '⚠️ Urgent (Aujourd\'hui)' : `⚠️ Urgent (J-${diffDays})`; }
                const div = document.createElement('div');
                div.className = `item ${cssClass}`;
                div.innerHTML = `
                    <input type="checkbox" onchange="inventory[${index}].selected = this.checked" ${item.selected ? 'checked' : ''}>
                    <div class="visual">${getEmoji(item.name)}</div>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-meta">${item.date} • ${item.loc}</span>
                        ${alertText ? `<span class="alert-text">${alertText}</span>` : ''}
                    </div>
                    <button class="del-btn" onclick="confirmDelete(${index})">Suppr</button>
                `;
                list.appendChild(div);
            });
        }

        function confirmDelete(index) {
            const item = inventory[index];
            showConfirm("Confirmer la suppression de l'élément " + item.name + " (" + item.date + " - " + item.loc + ") ?", () => {
                inventory.splice(index, 1);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                render();
            });
        }

        function handleBulkDelete() {
            const selected = inventory.filter(i => i.selected);
            if (selected.length === 0) return showAlert("Cochez au moins un élément à supprimer !");
            let html = "<strong>Supprimer les éléments sélectionnés ?</strong><ul style='padding-left: 20px; margin: 10px 0; font-size: 0.9rem;'>";
            selected.forEach(item => html += `<li>${item.name} (${item.date} - ${item.loc})</li>`);
            html += "</ul>";
            showConfirm(html, () => {
                inventory = inventory.filter(i => !i.selected);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                render();
            });
        }

        function addFood() {
            const name = document.getElementById('foodName').value;
            const date = document.getElementById('expiryDate').value;
            const loc = document.getElementById('storageLocation').value;
            if(!name || !date) return showAlert("Remplissez le nom et la date !");
            inventory.push({ name, date, loc, selected: false });
            localStorage.setItem('inventory', JSON.stringify(inventory));
            document.getElementById('foodName').value = '';
            render();
        }

        function searchRecipes() {
            const selected = inventory.filter(i => i.selected).map(i => i.name).join(" ");
            if(!selected) return showAlert("Cochez au moins un ingrédient !");
            window.open(`https://www.google.com/search?q=recette+anti-gaspi+${encodeURIComponent(selected)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
