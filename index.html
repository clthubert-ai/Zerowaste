<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gachi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; color: #2c3e50; }
        header { background: #2d5a27; color: white; padding: 25px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-add { background: #2d5a27; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-search { background: #7fb069; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .item { background: white; padding: 15px; margin-bottom: 12px; border-radius: 16px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .visual { font-size: 1.8rem; }
        .item-info { flex-grow: 1; }
        .del-btn { background: #fee2e2; color: #991b1b; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1>Zero Gachi</h1>
    </header>
    <div class="container">
        <input type="text" id="foodName" placeholder="Nom de l'aliment (ex: pomme, poulet...)">
        <input type="date" id="expiryDate">
        <select id="storageLocation">
            <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
            <option value="🧊 Congélateur">🧊 Congélateur</option>
            <option value="📦 Placard">📦 Placard</option>
        </select>
        <button class="btn-add" onclick="addFood()">Ajouter à l'inventaire</button>
        
        <div id="productList" style="margin-top: 20px;"></div>
        
        <button class="btn-search" onclick="searchRecipes()">Rechercher des recettes anti-gaspi</button>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory') || "[]");

        function getEmoji(name) {
            const n = name.toLowerCase();
            if (n.includes('pomme')) return '🍎';
            if (n.includes('poulet')) return '🍗';
            if (n.includes('poisson')) return '🐟';
            if (n.includes('lait')) return '🥛';
            if (n.includes('pain')) return '🍞';
            if (n.includes('oeuf')) return '🥚';
            if (n.includes('carotte')) return '🥕';
            return '🍽️';
        }

        function render() {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            // Tri par date d'expiration
            inventory.sort((a, b) => new Date(a.date) - new Date(b.date));
            inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="visual">${getEmoji(item.name)}</div>
                    <div class="item-info">
                        <strong>${item.name}</strong><br>
                        <small>${item.date} • ${item.loc}</small>
                    </div>
                    <button class="del-btn" onclick="deleteFood(${index})">Suppr</button>
                `;
                list.appendChild(div);
            });
        }

        function addFood() {
            const name = document.getElementById('foodName').value;
            const date = document.getElementById('expiryDate').value;
            const loc = document.getElementById('storageLocation').value;
            if(!name || !date) return alert("Remplissez le nom et la date !");
            inventory.push({ name, date, loc });
            localStorage.setItem('inventory', JSON.stringify(inventory));
            document.getElementById('foodName').value = '';
            render();
        }

        function deleteFood(index) {
            inventory.splice(index, 1);
            localStorage.setItem('inventory', JSON.stringify(inventory));
            render();
        }

        function searchRecipes() {
            if(inventory.length === 0) return alert("Ajoutez d'abord des ingrédients !");
            const ingredients = inventory.map(i => i.name).join(" ");
            window.open(`https://www.google.com/search?q=recette+anti-gaspi+avec+${encodeURIComponent(ingredients)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
