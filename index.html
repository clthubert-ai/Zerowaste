<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gachi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; color: #2c3e50; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        header { background: transparent; padding: 0; margin-bottom: 15px; border-radius: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; display: flex; justify-content: center; }
        .header-logo { width: 100%; height: auto; display: block; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .button-group button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: #3e7b37; color: white; } 
        .btn-del-selected { background: #d9534f; color: white; }
        .btn-search { background: #7fb069; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .item { 
            background: white; padding: 12px 15px; margin-bottom: 10px; border-radius: 14px; 
            display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            transition: all 0.2s ease; cursor: pointer;
        }
        .item.selected { border-left: 8px solid #3e7b37; border-right: 8px solid #3e7b37; background-color: #f0f7ef; }
        
        /* États */
        .item.urgent { background-color: #fff3cd; } 
        .item.urgent.selected { background-color: #fceec5; border-left: 8px solid #3e7b37; border-right: 8px solid #3e7b37; }
        .item.expired-yesterday { background-color: #ffcc99; } 
        .item.expired-yesterday.selected { background-color: #f9c088; border-left: 8px solid #3e7b37; border-right: 8px solid #3e7b37; }
        .item.expired-long { background-color: #c9302c; } 
        .item.expired-long.selected { background-color: #b02a26; border-left: 8px solid #3e7b37; border-right: 8px solid #3e7b37; }
        .item.expired-long .item-name, .item.expired-long .item-meta, .item.expired-long .item-alert { color: white; }
        
        .visual { font-size: 1.4rem; width: 30px; text-align: center; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; overflow: hidden; }
        .item-name { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 0.75rem; color: #666; }
        .item.expired-long .item-meta { color: #ffe5e5; }
        .item-alert { flex-shrink: 0; font-weight: bold; font-size: 0.75rem; margin-left: 10px; white-space: nowrap; text-align: right; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; overflow-y: auto; }
        .modal-overlay.top-aligned { align-items: flex-start; padding-top: 50px; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #eee; }
        .btn-confirm { background: #3e7b37; color: white; }
    </style>
</head>
<body>
    
    <div class="container">
        <header>
            <img src="logo.png" alt="Zero Gachi" class="header-logo">
        </header>

        <div class="button-group">
            <button class="btn-add" onclick="openAddModal()">Ajout d'un aliment</button>
            <button class="btn-del-selected" onclick="handleBulkDelete()">Suppression d'aliment(s)</button>
        </div>
        
        <button class="btn-search" onclick="searchRecipes()">Rechercher des recettes</button>
        <div id="productList" style="margin-top: 20px;"></div>
    </div>

    <!-- Modale Ajout/Édition -->
    <div id="itemModal" class="modal-overlay top-aligned">
        <div class="modal-box">
            <h3 id="modalTitle">Aliment</h3>
            <input type="text" id="foodName" class="modal-input" placeholder="Nom de l'aliment">
            <input type="date" id="expiryDate" class="modal-input">
            <input type="text" id="foodEmoji" class="modal-input" placeholder="Emoji (optionnel, ex: 🍎)">
            <select id="storageLocation" class="modal-input">
                <option value="❄️ Réfrigérateur">❄️ Réfrigérateur</option>
                <option value="🧊 Congélateur">🧊 Congélateur</option>
                <option value="📦 Placard">📦 Placard</option>
            </select>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="closeModal('itemModal')">Annuler</button>
                <button class="modal-btn btn-confirm" onclick="saveFood()">Enregistrer</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <div id="confirmText" style="text-align: left;"></div>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="closeModal('confirmModal')">Annuler</button>
                <button class="modal-btn btn-confirm" id="confirmOk">OK</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay">
        <div class="modal-box">
            <div id="alertText"></div>
            <div class="modal-btns" style="justify-content: center;">
                <button class="modal-btn btn-confirm" onclick="closeModal('alertModal')">OK</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory') || "[]");
        let editingId = null;

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').innerText = "Nouvel aliment";
            document.getElementById('foodName').value = '';
            document.getElementById('expiryDate').value = '';
            document.getElementById('foodEmoji').value = '';
            document.getElementById('itemModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const item = inventory.find(i => String(i.id) === String(id));
            if (!item) return;
            editingId = id;
            document.getElementById('modalTitle').innerText = "Modifier l'aliment";
            document.getElementById('foodName').value = item.name;
            document.getElementById('expiryDate').value = item.date;
            document.getElementById('foodEmoji').value = item.customEmoji || '';
            document.getElementById('storageLocation').value = item.loc;
            document.getElementById('itemModal').style.display = 'flex';
        }

        function saveFood() {
            const name = document.getElementById('foodName').value;
            const date = document.getElementById('expiryDate').value;
            const loc = document.getElementById('storageLocation').value;
            const customEmoji = document.getElementById('foodEmoji').value;
            
            if(!name || !date) return showAlert("Remplissez le nom et la date !");
            
            if (editingId) {
                // Édition
                const item = inventory.find(i => String(i.id) === String(editingId));
                item.name = name; item.date = date; item.loc = loc; item.customEmoji = customEmoji;
            } else {
                // Création
                inventory.push({ id: Date.now().toString(), name, date, loc, customEmoji, selected: false });
            }
            
            localStorage.setItem('inventory', JSON.stringify(inventory));
            closeModal('itemModal');
            render();
        }

        function showConfirm(message, callback) {
            document.getElementById('confirmText').innerHTML = message;
            document.getElementById('confirmOk').onclick = () => { callback(); closeModal('confirmModal'); };
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function showAlert(message) {
            document.getElementById('alertText').innerHTML = message;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function toggleSelect(id) {
            const item = inventory.find(i => String(i.id) === String(id));
            if(item) {
                item.selected = !item.selected;
                localStorage.setItem('inventory', JSON.stringify(inventory));
                render();
            }
        }

        function getEmoji(item) {
            // Priorité à l'emoji personnalisé si défini
            if (item.customEmoji && item.customEmoji.trim() !== '') return item.customEmoji;

            const n = item.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            const exactMatches = {
                'banane': '🍌', 'bananes': '🍌', 'pomme': '🍎', 'pommes': '🍎', 'poire': '🍐', 'poires': '🍐',
                'orange': '🍊', 'oranges': '🍊', 'citron': '🍋', 'citrons': '🍋', 'fraise': '🍓', 'fraises': '🍓',
                'framboise': '🍓', 'framboises': '🍓', 'myrtille': '🫐', 'myrtilles': '🫐', 'cerise': '🍒', 'cerises': '🍒',
                'peche': '🍑', 'peches': '🍑', 'mangue': '🥭', 'mangues': '🥭', 'raisin': '🍇', 'raisins': '🍇',
                'ananas': '🍍', 'kiwi': '🥝', 'kiwis': '🥝', 'melon': '🍈', 'melons': '🍈', 'pasteque': '🍉',
                'pasteques': '🍉', 'abricot': '🍑', 'abricots': '🍑', 'prune': '🍑', 'prunes': '🍑',
                'concombre': '🥒', 'concombres': '🥒', 'carotte': '🥕', 'carottes': '🥕', 'brocoli': '🥦', 'brocolis': '🥦',
                'oignon': '🧅', 'oignons': '🧅', 'ail': '🧄', 'champignon': '🍄', 'champignons': '🍄', 'poivron': '🫑',
                'poivrons': '🫑', 'salade': '🥬', 'tomate': '🍅', 'tomates': '🍅', 'patate': '🥔', 'patates': '🥔',
                'pomme de terre': '🥔', 'pommes de terre': '🥔', 'haricot': '🫘', 'haricots': '🫘', 'epinard': '🍃',
                'epinards': '🍃', 'courgette': '🥒', 'courgettes': '🥒', 'aubergine': '🍆', 'aubergines': '🍆',
                'chou': '🥬', 'choux': '🥬', 'asperge': '🥬', 'asperges': '🥬', 'poireau': '🥬', 'poireaux': '🥬',
                'radis': '🥗', 'mais': '🌽', 'avocat': '🥑', 'avocats': '🥑',
                'steak': '🥩', 'steaks': '🥩', 'gigot': '🥩', 'jambon': '🍖', 'chorizo': '🍖', 'poulet': '🍗', 'poulets': '🍗',
                'saumon': '🐟', 'saumons': '🐟', 'thon': '🐟', 'thons': '🐟', 'crevette': '🍤', 'crevettes': '🍤',
                'saucisse': '🌭', 'saucisses': '🌭', 'cote de porc': '🥩', 'cotes de porc': '🥩', 'cote de boeuf': '🥩',
                'cotes de boeuf': '🥩', 'cote de mouton': '🥩', 'cotes de mouton': '🥩', 'lard': '🥓', 'bacon': '🥓',
                'oeuf': '🥚', 'oeufs': '🥚', 'œuf': '🥚', 'œufs': '🥚', 'poisson': '🐟', 'poissons': '🐟',
                'pain': '🍞', 'baguette': '🥖', 'baguettes': '🥖', 'croissant': '🥐', 'croissants': '🥐',
                'brioche': '🍞', 'brioches': '🍞', 'biscuit': '🍪', 'biscuits': '🍪', 'gateau': '🍰', 'gateaux': '🍰',
                'riz': '🍚', 'pate': '🍝', 'pates': '🍝', 'nouille': '🍜', 'nouilles': '🍜', 'pizza': '🍕',
                'pizzas': '🍕', 'taco': '🌮', 'tacos': '🌮', 'burger': '🍔', 'burgers': '🍔', 'sushi': '🍣',
                'sushis': '🍣',
                'lait': '🥛', 'fromage': '🧀', 'fromages': '🧀', 'beurre': '🧈', 'yaourt': '🥣', 'yaourts': '🥣',
                'creme': '🥛', 'cremes': '🥛',
                'soupe': '🥣', 'soupes': '🥣'
            };
            if (exactMatches[n]) return exactMatches[n];
            const categories = [
                { emoji: '🥩', keys: ['viande', 'boeuf', 'porc', 'agneau', 'dinde', 'canard', 'volaille', 'saucisse', 'charcuterie', 'escalope'] },
                { emoji: '🐟', keys: ['poisson', 'saumon', 'thon', 'cabillaud', 'crevette', 'dorade', 'bar', 'sardine', 'sole', 'merlu', 'colin'] },
                { emoji: '🧀', keys: ['fromage', 'comte', 'cancoillotte', 'emmental', 'gruyere', 'camembert', 'brie', 'bleu', 'roquefort', 'vache qui rit', 'chevre', 'morbier', 'abondance', 'ricotta', 'mozzarella'] },
                { emoji: '🥦', keys: ['legume', 'tomate', 'carotte', 'courgette', 'brocoli', 'oignon', 'ail', 'champignon', 'poivron', 'aubergine', 'patate', 'pomme de terre', 'salade', 'haricot', 'epinard', 'chou', 'asperge', 'celeri', 'navet', 'radis', 'artichaut', 'betterave', 'fenouil', 'citrouille', 'potiron', 'topinambour'] },
                { emoji: '🍎', keys: ['fruit', 'abricot', 'prune', 'figue', 'melon', 'pasteque', 'pamplemousse', 'clementine', 'mandarine', 'grenade', 'goyave', 'litchi', 'nectarine', 'mirabelle'] },
                { emoji: '🌾', keys: ['cereale', 'brioche', 'biscuit', 'galette', 'semoule', 'farine', 'riz', 'pate', 'nouille', 'ble', 'avoine', 'mais', 'quinoa', 'boulgour', 'pain', 'pain de mie'] },
                { emoji: '🥛', keys: ['creme', 'beurre', 'brie', 'camembert', 'emmental', 'laitage', 'yaourt', 'lait', 'fromage blanc'] },
                { emoji: '🍲', keys: ['potage', 'veloute', 'bouillon', 'soupe'] }
            ];
            for (let cat of categories) { if (cat.keys.some(key => n.includes(key))) return cat.emoji; }
            return '🍽️';
        }

        function render() {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            inventory.sort((a, b) => new Date(a.date) - new Date(b.date));
            const today = new Date(); today.setHours(0,0,0,0);
            
            inventory.forEach((item) => {
                const expiry = new Date(item.date);
                const diffDays = Math.round((expiry - today) / (1000 * 60 * 60 * 24));
                let cssClass = '', alertText = '';
                
                if (diffDays < -1) { cssClass = 'expired-long'; alertText = 'Périmé ' + Math.abs(diffDays) + 'j ❌'; }
                else if (diffDays === -1) { cssClass = 'expired-yesterday'; alertText = 'Périmé 1j ⚠️'; }
                else if (diffDays >= 0 && diffDays <= 2) { cssClass = 'urgent'; alertText = 'Date proche ⏳'; }
                
                const div = document.createElement('div');
                div.className = `item ${cssClass} ${item.selected ? 'selected' : ''}`;
                
                // Clic simple pour sélectionner
                div.onclick = () => toggleSelect(item.id);
                
                // Clic droit / Appui long pour modifier
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    openEditModal(item.id);
                };
                
                div.innerHTML = `
                    <div class="visual">${getEmoji(item)}</div>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-meta">${item.date} • ${item.loc}</span>
                    </div>
                    <div class="item-alert">${alertText}</div>
                `;
                list.appendChild(div);
            });
        }

        function handleBulkDelete() {
            const selected = inventory.filter(i => i.selected);
            if (selected.length === 0) return showAlert("Sélectionnez au moins un aliment !");
            
            let listHtml = "<strong>Supprimer les éléments sélectionnés ?</strong><ul style='text-align:left; font-size:0.9rem; margin-top:10px; padding-left:20px;'>";
            selected.forEach(item => {
                listHtml += `<li><strong>${item.name}</strong> - ${item.date} (${item.loc})</li>`;
            });
            listHtml += "</ul>";
            
            showConfirm(listHtml, () => {
                inventory = inventory.filter(i => !i.selected);
                localStorage.setItem('inventory', JSON.stringify(inventory));
                render();
            });
        }

        function searchRecipes() {
            const selected = inventory.filter(i => i.selected).map(i => i.name).join(" ");
            if(!selected) return showAlert("Cochez au moins un ingrédient !");
            window.open(`https://www.google.com/search?q=recette+anti-gaspi+${encodeURIComponent(selected)}`, '_blank');
        }

        render();
    </script>
</body>
</html>
